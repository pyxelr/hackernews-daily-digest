name: Daily HN Digest

on:
  schedule:
    # 06:17 UTC daily. GitHub queues scheduled jobs on a best-effort basis and
    # delays them heavily on the hour, so we use an off-peak minute.
    #   -> ~08:17 in Poland during summer (CEST, UTC+2)
    #   -> ~07:17 in Poland during winter (CET,  UTC+1)
    # Adjust the hour to taste; times are always UTC. https://crontab.guru
    - cron: "17 6 * * *"
  # Lets you run it on demand from the Actions tab (great for the first test).
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build HTML artifact, do not send email)"
        type: boolean
        default: false

# GitHub Actions is free with unlimited minutes for public repositories.
jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build and send digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          NUM_STORIES: ${{ vars.NUM_STORIES || '30' }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: python main.py

      - name: Upload digest artifact (dry run only)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: digest-html
          path: output/digest.html
          if-no-files-found: ignore
