name: Daily HN Digest

on:
  schedule:
    # Goal: fire at ~05:17 Poland time every day. GitHub cron is UTC-only and
    # does NOT follow daylight saving, so we schedule BOTH candidate UTC times
    # and let the job's DST guard (RUN_ONLY_AT_LOCAL_HOUR=5) run only the one
    # that actually lands on 05:xx in Europe/Warsaw:
    #   - 03:17 UTC -> 05:17 CEST (summer, UTC+2)
    #   - 04:17 UTC -> 05:17 CET  (winter, UTC+1)
    # The off-hour :17 minute reduces GitHub's peak-load scheduling delay.
    - cron: "17 3 * * *"
    - cron: "17 4 * * *"
  # Lets you run it on demand from the Actions tab (great for the first test).
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build HTML artifact, do not send email)"
        type: boolean
        default: false

# GitHub Actions is free with unlimited minutes for public repositories.
jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # uv manages both the Python interpreter and the dependencies, installing
      # from a warm cache in a couple of seconds. The cache is keyed on uv.lock,
      # so it only re-downloads when locked dependencies actually change.
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies (locked)
        run: uv sync --frozen

      - name: Build and send digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.6-flash' }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          NUM_STORIES: ${{ vars.NUM_STORIES || '30' }}
          DISPLAY_TIMEZONE: ${{ vars.DISPLAY_TIMEZONE || 'Europe/Warsaw' }}
          # Empty label = accurate DST-aware abbreviation (CET / CEST).
          DISPLAY_TZ_LABEL: ${{ vars.DISPLAY_TZ_LABEL || '' }}
          # DST guard: with the two cron times above, only the cron that maps to
          # 05:xx Warsaw time proceeds; the other exits early. Manual runs ignore it.
          RUN_ONLY_AT_LOCAL_HOUR: "5"
          # The cron entry that triggered this run (empty for manual runs). Lets
          # the guard decide by *scheduled* time, robust to GitHub's run delays.
          TRIGGER_CRON: ${{ github.event.schedule }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: uv run python main.py

      - name: Upload digest artifact (dry run only)
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: digest-html
          path: output/digest.html
          if-no-files-found: ignore
